name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Type check
        run: mypy src/osc_tracking/ --ignore-missing-imports

  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest --tb=short -q
      - name: Coverage
        if: matrix.python-version == '3.12'
        # Ratchet: guards against regression from the current ~27% total.
        # Raise alongside adding tests for currently-untested modules
        # (gesture_detector, motion_smoothing, recorder, simulator, ...).
        run: pytest --cov=osc_tracking --cov-report=term-missing --cov-fail-under=25
