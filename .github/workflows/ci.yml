name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly pip-audit run catches newly-disclosed CVEs in the pinned
    # dependency ranges without waiting for the next PR.
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Type check
        run: mypy src/osc_tracking/ --ignore-missing-imports

  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest --tb=short -q
      - name: Coverage
        if: matrix.python-version == '3.12'
        # Ratchet: current floor reflects Tier B work (vmc_sender / bvh /
        # notifications / profiler / rest_api all now 90%+). Raise only
        # after adding tests for additional modules.
        run: pytest --cov=osc_tracking --cov-report=term-missing --cov-fail-under=45

  e2e-smoke:
    # Run the simulator end-to-end against a mocked sender so the full
    # FusionEngine loop is exercised in CI without any hardware. Catches
    # import/config/event-plumbing regressions that unit tests miss.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Verify all tracking modes
        run: python -m osc_tracking.tools.simulate --verify-modes --no-network --duration 10

  security-audit:
    # Weekly + PR trigger. Fails the job on any CVE matching the pinned
    # dependency ranges so we know before users ship.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]" pip-audit
      - name: Audit dependencies for known CVEs
        # Audit a materialized requirements file that excludes the local
        # editable project (not published to PyPI). --strict alone refuses
        # to coexist with --skip-editable, so we feed pip-audit a filtered
        # freeze list via -r instead.
        run: |
          pip freeze --exclude-editable > /tmp/deps.txt
          pip-audit --strict -r /tmp/deps.txt
